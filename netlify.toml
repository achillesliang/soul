[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/pi-approve"
  to   = "/.netlify/functions/pi-approve"
  status = 200

[[redirects]]
  from = "/api/pi-complete"
  to   = "/.netlify/functions/pi-complete"
  status = 200

[[redirects]]
  from = "/api/pi-me"
  to   = "/.netlify/functions/pi-me"
  status = 200

[[redirects]]
  from = "/api/ai-chat"
  to   = "/.netlify/functions/ai-chat"
  status = 200

[[redirects]]
  from = "/api/planet"
  to   = "/.netlify/functions/planet"
  status = 200

[[redirects]]
  from = "/api/planet-leaderboard"
  to   = "/.netlify/functions/planet-leaderboard"
  status = 200

[[redirects]]
  from = "/api/memorial"
  to   = "/.netlify/functions/memorial"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors *"
