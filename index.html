function seedPlanet(name,birth){
  const s=((name||"soul")+(birth||"")).split("").reduce((a,c)=>(a*31+c.charCodeAt(0))|0,0);
  const r=n=>Math.abs(((s*1664525+n*6364136+1013904223)&0x7fffffff)/0x7fffffff);
  const pt=PLANET_TYPES[Math.floor(r(1)*PLANET_TYPES.length)];
  return{pType:pt,atmo:ATMO[Math.floor(r(2)*ATMO.length)],feature:FEATURES[Math.floor(r(13)*FEATURES.length)],
    ra:`${String(Math.floor(r(3)*24)).padStart(2,"0")}h ${String(Math.floor(r(4)*60)).padStart(2,"0")}m ${(r(5)*60).toFixed(1)}s`,
    dec:`${r(6)>.5?"+":"-"}${Math.floor(r(7)*90)}° ${Math.floor(r(8)*60)}'`,
    dist:`${(r(9)*99+1).toFixed(2)} kly`,radius:`${(r(10)*15+.5).toFixed(2)} R⊕`,
    mass:`${(r(11)*50+.1).toFixed(2)} M⊕`,period:`${Math.floor(r(12)*1000+10)} Earth days`,
    planetId:"SOL-"+Math.abs(s%999999999).toString(16).toUpperCase().padStart(9,"0")};
}

          const onErr = () => { audio.removeEventListener("canplay",  onOk);  audio.removeEventListener("error", onErr); reject(); };
          audio.addEventListener("canplay", onOk);
          audio.addEventListener("error",   onErr);
          // 5s 超时
          setTimeout(() => { audio.removeEventListener("canplay", onOk); audio.removeEventListener("error", onErr); reject(); }, 5000);
        });
        return true; // 这个源可用
      } catch {
        console.warn("[Music] Source failed, trying next:", src);
      }
    }
    return false; // 所有源都失败
  }, []);

  // 随机选下一首（排除当前，避免连续重复）
  const randomNext = (cur) => {
    const others = BG_TRACKS.map((_,i)=>i).filter(i=>i!==cur);
    return others[Math.floor(Math.random()*others.length)];
  };

  // 初始化 audio
  useEffect(()=>{
    const audio = new Audio();
    audio.volume = 0.3;
    audio.preload = "none";
    // 当前曲目播完自动切下一首
    audio.addEventListener("ended", ()=>{
      setTrackIdx(cur=>{
        const next = shuffle ? randomNext(cur) : (cur+1)%BG_TRACKS.length;
        historyRef.current.push(next);
        return next;
      });
    });
    audioRef.current = audio;
    return()=>{ audio.pause(); audio.src=""; };
  },[]);

  // 切换曲目（有起点才切）— 自动尝试备用源
  useEffect(()=>{
    const audio = audioRef.current;
    if(!audio||!started) return;
    const wasPlaying = !audio.paused;
    setLoading(true);
    tryLoadAudio(audio, BG_TRACKS[trackIdx].sources).then(ok=>{
      if(!ok){ setLoading(false); return; }
      if(wasPlaying){
        audio.play()
          .then(()=>{ setPlaying(true); setLoading(false); })
          .catch(()=>setLoading(false));
      } else {
        setLoading(false);
      }
    });
  },[trackIdx, tryLoadAudio]);

  // 音量
  useEffect(()=>{
    if(audioRef.current) audioRef.current.volume = volume;
  },[volume]);

  const toggle = ()=>{
    const audio = audioRef.current;
    if(!audio) return;
    if(!started){
      // 第一次播放：随机或顺序起点
      const startIdx = shuffle ? Math.floor(Math.random()*BG_TRACKS.length) : 0;
      setTrackIdx(startIdx);
      setStarted(true);
      setLoading(true);
      tryLoadAudio(audio, BG_TRACKS[startIdx].sources).then(ok=>{
        if(!ok){ setLoading(false); return; }
        audio.play()
          .then(()=>{ setPlaying(true); setLoading(false); })
          .catch(()=>setLoading(false));
      });
      return;
    }
    if(audio.paused){
      audio.play().then(()=>setPlaying(true)).catch(()=>{});
    } else {
      audio.pause(); setPlaying(false);
    }
  };

  const goNext = ()=>{
    const next = shuffle ? randomNext(trackIdx) : (trackIdx+1)%BG_TRACKS.length;
    historyRef.current.push(trackIdx);
    setTrackIdx(next);
  };
  const goPrev = ()=>{
    if(historyRef.current.length>0){
      const prev = historyRef.current.pop();
      setTrackIdx(prev);
    } else {
      setTrackIdx(i=>(i-1+BG_TRACKS.length)%BG_TRACKS.length);
    }
  };

  const track = BG_TRACKS[trackIdx];
  const styleEmoji = {ambient:"🌌",meditation:"🪷",zen:"☯️"}[track.style]||"🎵";

  return(
    <div style={{position:"fixed",bottom:20,right:16,zIndex:200}}>
      {/* 控制面板 */}
      {showCtrl&&(
        <div style={{background:"rgba(12,8,35,0.96)",border:"1px solid rgba(150,130,255,0.25)",
            borderRadius:18,padding:"16px 18px",marginBottom:10,
            backdropFilter:"blur(20px)",boxShadow:"0 8px 36px rgba(0,0,0,0.6)",
            minWidth:220,animation:"fadeUp 0.2s ease"}}>

          {/* 当前曲目 */}
          <div style={{textAlign:"center",marginBottom:14}}>
            <div style={{fontSize:22,marginBottom:4}}>{styleEmoji}</div>
            <div style={{fontSize:13,color:"#e8e0ff",marginBottom:2}}>{track.name}</div>
            <div style={{fontSize:10,color:"rgba(180,160,255,0.4)",letterSpacing:1}}>
              {track.style.toUpperCase()}
              {loading&&" · 加载中…"}
            </div>
          </div>

          {/* 进度感知波形（纯装饰，随播放状态动） */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:2,height:24,marginBottom:14}}>
            {Array.from({length:16}).map((_,i)=>(
              <div key={i} style={{
                width:3,borderRadius:2,
                background:playing?"#7c6fff":"rgba(150,130,255,0.2)",
                height:playing?`${8+Math.abs(Math.sin(i*0.7))*14}px`:"4px",
                transition:"height 0.4s ease",
                animationDelay:`${i*0.05}s`,
              }}/>
            ))}
          </div>

          {/* 控制按钮行 */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:14}}>
            <button onClick={goPrev} style={{background:"none",border:"none",color:"rgba(180,160,255,0.6)",cursor:"pointer",fontSize:18,padding:4}} title="上一首">⏮</button>
            <button onClick={toggle} style={{
              width:44,height:44,borderRadius:"50%",
              background:"linear-gradient(135deg,#5b3fff,#9b59ff)",
              border:"none",color:"#fff",cursor:"pointer",fontSize:20,
              boxShadow:"0 4px 16px rgba(91,63,255,0.5)",
              display:"flex",alignItems:"center",justifyContent:"center",
              opacity:loading?0.6:1,
            }}>
              {loading?"…":playing?"⏸":"▶"}
            </button>
            <button onClick={goNext} style={{background:"none",border:"none",color:"rgba(180,160,255,0.6)",cursor:"pointer",fontSize:18,padding:4}} title="下一首">⏭</button>
          </div>

          {/* 随机 / 顺序 切换 */}
          <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
            <button onClick={()=>setShuffle(s=>!s)} style={{
              display:"flex",alignItems:"center",gap:5,
              background:shuffle?"rgba(124,111,255,0.2)":"rgba(100,80,200,0.08)",
              border:shuffle?"1px solid rgba(124,111,255,0.5)":"1px solid rgba(150,130,255,0.2)",
              borderRadius:20,padding:"4px 12px",cursor:"pointer",
              color:shuffle?"#c8b8ff":"rgba(180,160,255,0.45)",fontSize:11,transition:"all 0.2s",
            }}>
              <span>{shuffle?"🔀":"➡️"}</span>
              <span>{shuffle?(lang==="zh"?"随机播放":"Shuffle"):(lang==="zh"?"顺序播放":"Sequential")}</span>
            </button>
          </div>

          {/* 曲目列表 */}
          <div style={{maxHeight:140,overflowY:"auto",marginBottom:12}}>
            {BG_TRACKS.map((t,i)=>(
              <div key={i} onClick={()=>{historyRef.current.push(trackIdx);setTrackIdx(i);}} style={{
                display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:8,
                cursor:"pointer",background:i===trackIdx?"rgba(124,111,255,0.15)":"none",
                marginBottom:2,transition:"background 0.15s",
              }}>
                <span style={{fontSize:12}}>{({ambient:"🌌",meditation:"🪷",zen:"☯️"})[t.style]||"🎵"}</span>
                <span style={{fontSize:11,color:i===trackIdx?"#e8e0ff":"rgba(180,160,255,0.6)",flex:1}}>{t.name}</span>
                {i===trackIdx&&playing&&<span style={{fontSize:10,color:"#7c6fff"}}>♪</span>}
              </div>
            ))}
          </div>

          {/* 音量 */}
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:12,color:"rgba(180,160,255,0.4)"}}>🔈</span>
            <input type="range" min="0" max="1" step="0.05" value={volume}
              onChange={e=>setVolume(parseFloat(e.target.value))}
              style={{flex:1,accentColor:"#7c6fff",cursor:"pointer",height:3}}/>
            <span style={{fontSize:12,color:"rgba(180,160,255,0.4)"}}>🔊</span>
          </div>
          <div style={{marginTop:8,fontSize:10,color:"rgba(180,160,255,0.25)",textAlign:"center"}}>

          </div>
        </div>
      )}

      {/* 浮动主按钮 */}
      <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:6}}>
        {/* 随机/顺序快捷指示 */}
        {playing&&(
          <div style={{fontSize:14,opacity:.5}} title={shuffle?"随机":"顺序"}>
            {shuffle?"🔀":"➡️"}
          </div>
        )}
        <button onClick={()=>{
            if(!showCtrl){setShowCtrl(true);if(!started)toggle();}
            else setShowCtrl(false);
          }}

            width:46,height:46,borderRadius:"50%",
            background:playing
              ?"linear-gradient(135deg,#5b3fff,#9b59ff)"
              :"rgba(100,80,200,0.18)",

            color:playing?"#fff":"rgba(180,160,255,0.65)",
            cursor:"pointer",fontSize:19,
            boxShadow:playing?"0 4px 22px rgba(91,63,255,0.55)":"none",

            display:"flex",alignItems:"center",justifyContent:"center",
            animation:playing?"pulse 3s ease infinite":"none",
          }}
          title={lang==="zh"?"背景音乐":"Background Music"}
        >🎵</button>
      </div>
    </div>
  );
}

function StarField(){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current,ctx=c.getContext("2d");
    const resize=()=>{c.width=window.innerWidth;c.height=window.innerHeight;};
    resize();window.addEventListener("resize",resize);
    const stars=Array.from({length:250},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.4+.2,ph:Math.random()*Math.PI*2,sp:Math.random()*.004+.001}));
    let id;const draw=t=>{ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,210,255,${.25+.75*Math.abs(Math.sin(t*s.sp+s.ph))})`;ctx.fill();});id=requestAnimationFrame(draw);};
    id=requestAnimationFrame(draw);
    return()=>{cancelAnimationFrame(id);window.removeEventListener("resize",resize);};
  },[]);
  return <canvas ref={ref} style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}/>;
}

// ─── Pi Network Authentication ────────────────────────────────
// Follows pi-sdk-js PiService pattern:
// 1. Pi.init() is treated as a Promise and fully awaited
// 2. Auto-authenticates on mount inside Pi Browser
// 3. Access token is validated server-side via GET /api/pi/me
//    which proxies to https://api.minepi.com/v2/me
// 4. Falls back to demo mode when window.Pi is absent (dev)

// Inline backend: validates the Pi access token against Pi Platform API.
// In production replace this stub with a real server endpoint.
// Validate Pi access token via our own backend (avoids CORS on direct Pi API calls)
async function validatePiToken(accessToken) {
  try {
    const res = await fetch("/api/pi-me", {
      headers: { "Authorization": `Bearer ${accessToken}` },
    });
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

function usePiNetwork() {
  const [piUser,    setPiUser]    = useState(null);
  const [piLoading, setPiLoading] = useState(false);
  const [piError,   setPiError]   = useState(null);
  const piInitialized = useRef(false);

  // Core auth function — used both for auto-login and manual trigger
  const connectPi = useCallback(async () => {
    // ── Demo mode (not inside Pi Browser) ────────────────────
    if (!window.Pi) {
      setPiLoading(true);
      await new Promise(r => setTimeout(r, 1200));
      setPiUser({ username: "soul_pioneer_π", uid: "demo-uid-000", demo: true });
      setPiLoading(false);
      return true;
    }

    setPiLoading(true);
    setPiError(null);
    try {
      // Step 1 — await Pi.init() as a Promise so SDK is fully ready
      // Pi.init returns void in older SDK builds, so we normalise it.
      const initResult = window.Pi.init({ version: "2.0", sandbox: false });
      if (initResult && typeof initResult.then === "function") {
        await initResult;
      }
      piInitialized.current = true;

      // Step 2 — authenticate with "username" scope only
      const auth = await window.Pi.authenticate(
        ["username"],
        (payment) => {
          // Required incomplete-payment callback — log and ignore for now
          console.warn("Incomplete payment found:", payment?.identifier);
        }
      );

      // Step 3 — token validation is optional, never blocks login
      // Try /api/pi-me in background to get verified data, but don't wait on failure
      let username = auth.user?.username || "pi_user";
      let uid      = auth.user?.uid      || "unknown";
      try {
        const verified = await Promise.race([
          validatePiToken(auth.accessToken),
          new Promise(r => setTimeout(() => r(null), 3000)), // 3s timeout
        ]);
        if (verified?.username) username = verified.username;
        if (verified?.uid)      uid      = verified.uid;
      } catch (e) {
        console.warn("[Pi] Token validation skipped:", e);
      }

      setPiUser({ username, uid, accessToken: auth.accessToken, demo: false });
      setPiLoading(false);
      return true;
    } catch (err) {
      const msg = err?.message || "Authentication cancelled.";
      setPiError(msg);
      setPiLoading(false);
      return false;
    }
  }, []);

  // Auto-authenticate on mount
  useEffect(() => {
    connectPi();
  }, [connectPi]);

  // Pi payment backend helpers — calls our own Netlify Functions
  // which hold the server-side PI_API_KEY and call Pi Platform API
  const piApprove = async (paymentId) => {
    try {
      const res = await fetch("/api/pi-approve", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ paymentId }),
      });
      const data = await res.json();
      if (!res.ok) { console.error("[pi-approve] failed:", data); return false; }
      return true;
    } catch (err) { console.error("[pi-approve] error:", err); return false; }
  };

  const piComplete = async (paymentId, txid) => {
    try {
      const res = await fetch("/api/pi-complete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ paymentId, txid }),
      });
      const data = await res.json();
      if (!res.ok) { console.error("[pi-complete] failed:", data); return false; }
      return true;
    } catch (err) { console.error("[pi-complete] error:", err); return false; }
  };

  const payWithPi = useCallback(async (amount, memo) => {
    // ── Demo mode (no Pi Browser) ─────────────────────────────
    if (!window.Pi) {
      await new Promise(r => setTimeout(r, 1800));
      return { success: true, txid: "demo_tx_" + Math.random().toString(36).slice(2, 10) };
    }
    // ── Ensure SDK initialised ────────────────────────────────
    if (!piInitialized.current) {
      const initResult = window.Pi.init({ version: "2.0", sandbox: false });
      if (initResult && typeof initResult.then === "function") await initResult;
      piInitialized.current = true;
    }

    // Get current user's access token from piUser ref for API calls
    const accessToken = piUser?.accessToken || null;

    return new Promise(res => {
      window.Pi.createPayment(
        { amount, memo, metadata: { app: "soul-haven", memo } },
        {
          onReadyForServerApproval: async (paymentId) => {
            console.log("[Pi] Approving payment:", paymentId);
            const ok = await piApprove(paymentId);
            if (!ok) console.warn("[Pi] Approve failed — payment may stall");
          },
          onReadyForServerCompletion: async (paymentId, txid) => {
            console.log("[Pi] Completing payment:", paymentId, txid);
            await piComplete(paymentId, txid);
            res({ success: true, txid });
          },
          onCancel: () => {
            console.log("[Pi] Payment cancelled");
            res({ success: false, reason: "cancelled" });
          },
          onError: (err, payment) => {
            console.error("[Pi] Payment error:", err, payment);
            res({ success: false, reason: err?.message || "unknown error" });
          },
        }
      );
    });
  }, [piUser]);

  return { piUser, connectPi, payWithPi, piLoading, piError };
}

        <div style={{display:"flex",alignItems:"center",gap:2,height:38,overflowX:"auto",borderTop:"1px solid rgba(150,130,255,0.08)"}}>

            {lang==="zh"?activeGroup.zh2:activeGroup.en2}

          {activeGroup.pages.map(pid=>(
            <button key={pid} onClick={()=>setPage(pid)}
              style={{background:page===pid?"rgba(100,80,200,0.2)":"none",border:"none",
                borderBottom:page===pid?"2px solid #9b59ff":"2px solid transparent",

                fontSize:11.5,cursor:"pointer",fontFamily:"'Noto Serif SC',serif",whiteSpace:"nowrap",flexShrink:0,transition:"all 0.2s"}}>

          ))}
        </div>
      </div>

          {piError}
        </div>
      )}
    </nav>
  );
}

function HomePage({profile,setProfile,piUser,connectPi,payWithPi,lang}){
  const [step,setStep]=useState(profile.name?"card":"landing");
  const [mintStatus,setMintStatus]=useState(null);

    setMintStatus("paying");
    // Sandbox timeout: if payment doesn't complete in 30s, show error
    const payPromise = payWithPi(1,"Soul NFT");
    const timeoutPromise = new Promise(res=>setTimeout(()=>res({success:false,reason:"timeout"}),60000));
    const r = await Promise.race([payPromise, timeoutPromise]);
    if(r.success){
      setMintStatus("minting");
      await new Promise(x=>setTimeout(x,2000));
      setProfile(p=>({...p,nft:true,txid:r.txid}));
      setMintStatus("done");

      setMintStatus(null);
      if(r.reason==="timeout"){
        alert(lang==="zh"?"支付超时，请确认 PI_API_KEY 已在 Netlify 配置":"Payment timeout — check PI_API_KEY in Netlify settings");

  const days=profile.birth?calcDays(profile.birth):0;

          <div style={{fontFamily:"'Ma Shan Zheng',serif",fontSize:24,color:"#e8e0ff",letterSpacing:3}}>{profile.name}</div>
          <div style={{fontSize:11,color:tc.color,letterSpacing:4,marginTop:4}}>SOUL · {tc[lang]||tc.en}</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
          {[[tl("born",lang),profile.birth],[tl("soulAge",lang),`${(days/365.25).toFixed(1)} ${tl("yearsOld",lang)}`],[tl("walkedDays",lang),`${days.toLocaleString()}${tl("daysSuffix",lang)}`],[tl("dest",lang),tc[lang]||tc.en]].map(([k,v])=>(
            <div key={k} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"11px 13px",border:"1px solid rgba(150,130,255,0.12)"}}>
              <div style={{fontSize:10,color:"rgba(180,160,255,0.45)",letterSpacing:2,marginBottom:4}}>{k}</div>
              <div style={{fontSize:13,color:"#d4c8ff"}}>{v}</div>

          ))}
        </div>
        {profile.epitaph&&<div style={{borderTop:"1px solid rgba(150,130,255,0.12)",paddingTop:14,marginBottom:14,fontSize:13,color:"rgba(220,210,255,0.8)",fontStyle:"italic",lineHeight:1.9}}>"{profile.epitaph}"</div>}

function RitualPage({profile,piUser,payWithPi,lang}){
  const [tab,setTab]=useState("ritual");   // "ritual" | "temple"
  const [done,setDone]=useState({});
  const [activeMsg,setActiveMsg]=useState(null);
  const [floats,setFloats]=useState([]);
  // temple state
  const [selGod,setSelGod]=useState(null);
  const [wish,setWish]=useState("");
  const [incenseDone,setIncenseDone]=useState({});
  const [wishDone,setWishDone]=useState({});
  const [wishing,setWishing]=useState(false);
  const [incensing,setIncensing]=useState(false);
  const [communityWishes]=useState([
    {name:"苍海一粟",god:"guanyin",wish:"愿家人平安健康，岁岁无忧",time:"3小时前"},
    {name:"林间听风",god:"caishen",wish:"新的一年生意兴隆，财源广进",time:"5小时前"},
    {name:"极光舞者",god:"ganesha",wish:"愿考试顺利，前途光明无阻",time:"1天前"},
    {name:"樱花落尘",god:"mary",wish:"愿逝去的亲人安息，天堂没有痛苦",time:"2天前"},
  ]);

  const doRitual=r=>{
    if(done[r.id])return;setDone(d=>({...d,[r.id]:true}));setActiveMsg(r.msg[lang==="zh"?"zh":"en"]);
    const fp=Array.from({length:10},(_,i)=>({id:Date.now()+i,char:["✦","✧","⋆","·","˙"][i%5],color:r.color,x:35+Math.random()*30,y:55+Math.random()*20}));
    setFloats(f=>[...f,...fp]);setTimeout(()=>setFloats(f=>f.filter(p=>!fp.find(n=>n.id===p.id))),2000);setTimeout(()=>setActiveMsg(null),3200);
  };

  const burnIncense=async(god)=>{
    if(incenseDone[god.id]||!piUser)return;
    setIncensing(true);
    await payWithPi(god.incensePrice,"众神殿-上香-"+god.id);
    await new Promise(r=>setTimeout(r,1200));
    setIncenseDone(d=>({...d,[god.id]:true}));
    setIncensing(false);
  };

  const makeWish=async()=>{
    if(!wish.trim()||!piUser||!selGod)return;
    setWishing(true);
    await payWithPi(.1,"众神殿-祈愿-"+selGod.id);
    await new Promise(r=>setTimeout(r,1500));
    setWishDone(d=>({...d,[selGod.id]:wish}));
    setWish("");setWishing(false);
  };

  const godName=g=>lang==="zh"?g.name.zh:g.name.en;
  const rLabel=r=>lang==="zh"?r.zh:r.en;

  return(
    <div style={S.section}>
      {/* Tab switcher */}
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {[["ritual",tl("ritualTab",lang),"🕯️"],["temple",tl("templeTab",lang),"🏯"]].map(([id,label,emoji])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"12px",borderRadius:14,border:tab===id?"1px solid rgba(150,130,255,0.5)":"1px solid rgba(150,130,255,0.15)",background:tab===id?"rgba(100,80,200,0.25)":"rgba(100,80,200,0.06)",color:tab===id?"#e8e0ff":"rgba(180,160,255,0.5)",fontSize:14,cursor:"pointer",fontFamily:"'Noto Serif SC',serif",transition:"all 0.2s"}}>
            {emoji} {label}
          </button>
        ))}
      </div>

      {/* ── 祭奠仪式 tab ── */}
      {tab==="ritual"&&(
        <>
          <div style={{marginBottom:16}}>
            <h2 style={{fontFamily:"'Ma Shan Zheng',serif",fontSize:24,color:"#e8e0ff",margin:"0 0 4px"}}>{tl("ritualTitle",lang)}</h2>
            <p style={{fontSize:13,color:"rgba(180,160,255,0.5)",margin:0}}>{tl("ritualSub",lang)}</p>
          </div>
          <div style={{...S.card,padding:"14px 18px",marginBottom:14,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:11,color:"rgba(180,160,255,0.4)"}}>{tl("ritualTo",lang)}</span>
            {MOCK_SOULS.slice(0,5).map(s=>(
              <div key={s.id} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",background:"rgba(100,80,200,0.12)",borderRadius:20,border:"1px solid rgba(150,130,255,0.15)"}}>
                <span style={{fontSize:12}}>{THEME_CONFIG[s.theme].emoji}</span><span style={{fontSize:11,color:"#d4c8ff"}}>{s.name}</span>
              </div>
            ))}
          </div>
          <div style={{...S.card,padding:"28px 20px",marginBottom:14,position:"relative",overflow:"hidden",minHeight:200}}>
            <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 100%,rgba(91,63,255,0.07),transparent 70%)"}}/>
            <div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"hidden"}}>
              {floats.map(p=><div key={p.id} style={{position:"absolute",left:`${p.x}%`,top:`${p.y}%`,fontSize:14,color:p.color,animation:"floatUp 2s ease-out forwards"}}>{p.char}</div>)}

                <div style={{fontFamily:"'Ma Shan Zheng',serif",fontSize:15,color:"#e8d8ff",background:"rgba(12,8,35,0.92)",padding:"12px 20px",borderRadius:12,border:"1px solid rgba(150,130,255,0.2)",backdropFilter:"blur(8px)",textAlign:"center",lineHeight:1.8}}>{activeMsg}</div>
              </div>
            )}
            <div style={{position:"relative",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>

            </div>
            {Object.keys(done).length===RITUALS.length&&<div style={{marginTop:10,textAlign:"center",fontSize:13,color:"#a898ff",fontFamily:"'Ma Shan Zheng',serif"}}>{tl("ritualComplete",lang)}</div>}
          </div>
        </>
      )}

      {/* ── 众神殿 tab ── */}
      {tab==="temple"&&(
        <>
          <div style={{marginBottom:16}}>
            <h2 style={{fontFamily:"'Ma Shan Zheng',serif",fontSize:24,color:"#e8e0ff",margin:"0 0 4px"}}>{tl("templeTitle",lang)}</h2>

// ─── 改进版灵魂地块 ────────────────────────────────────────────
// ─── 灵魂星球 ──────────────────────────────────────────────────
function PlanetCanvas({planet,size=180}){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current;if(!c)return;
    c.width=size*2;c.height=size*2;
    const ctx=c.getContext("2d"),cx=size,cy=size,r=size*.72,col=planet.pType.color;
    let angle=0,id;
    const draw=()=>{
      ctx.clearRect(0,0,c.width,c.height);
      const glow=ctx.createRadialGradient(cx,cy,r*.5,cx,cy,r*1.8);glow.addColorStop(0,col+"33");glow.addColorStop(1,"transparent");ctx.fillStyle=glow;ctx.fillRect(0,0,c.width,c.height);
      const grad=ctx.createRadialGradient(cx-r*.28,cy-r*.28,r*.04,cx,cy,r);grad.addColorStop(0,"#ffffff33");grad.addColorStop(.25,col+"ee");grad.addColorStop(.7,col+"99");grad.addColorStop(1,col+"22");
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
      ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();
      for(let i=0;i<6;i++){const y=cy-r+(r*2*(i+.5)/6),bw=r*(.12+.08*Math.sin(i*1.1+angle*.4));ctx.fillStyle=`rgba(255,255,255,${.04+.03*Math.sin(i*1.7+angle)})`;ctx.fillRect(cx-r,y-bw/2,r*2,bw);}
      const sx=cx+r*.32*Math.cos(angle*.8),sy=cy+r*.18*Math.sin(angle*.6);const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,r*.16);sg.addColorStop(0,"rgba(255,255,255,0.22)");sg.addColorStop(1,"transparent");ctx.fillStyle=sg;ctx.beginPath();ctx.ellipse(sx,sy,r*.16,r*.09,angle*.3,0,Math.PI*2);ctx.fill();
      ctx.restore();
      if(planet.pType.ring){ctx.save();ctx.translate(cx,cy);ctx.scale(1,.26);[1.28,1.42,1.56].forEach((rr,i)=>{ctx.beginPath();ctx.arc(0,0,r*rr,0,Math.PI*2);ctx.strokeStyle=col+(i===1?"66":"33");ctx.lineWidth=i===1?9:5;ctx.stroke();});ctx.restore();}
      const hl=ctx.createRadialGradient(cx-r*.32,cy-r*.32,0,cx-r*.32,cy-r*.32,r*.55);hl.addColorStop(0,"rgba(255,255,255,0.2)");hl.addColorStop(1,"transparent");ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=hl;ctx.fill();
      angle+=.007;id=requestAnimationFrame(draw);
    };
    id=requestAnimationFrame(draw);return()=>cancelAnimationFrame(id);
  },[planet,size]);
  return <canvas ref={ref} style={{width:size,height:size}}/>;
}

function PlanetPage({profile,piUser,connectPi,payWithPi,lang}){
  const [phase,setPhase]=useState("intro");
  const [planet,setPlanet]=useState(null);
  const [aiDesc,setAiDesc]=useState("");
  const [minting,setMinting]=useState(false);
  const [txid,setTxid]=useState(null);
  const [connecting,setConnecting]=useState(false);
  const [tick,setTick]=useState(0);
  const [view,setView]=useState("mine"); // mine | leaderboard
  const [myStats,setMyStats]=useState(null);
  const [board,setBoard]=useState(null);
  const [boardLoading,setBoardLoading]=useState(false);
  const [viewing,setViewing]=useState(null); // 正在查看别人的星球详情
  useEffect(()=>{if(phase!=="generating")return;const id=setInterval(()=>setTick(t=>t+1),60);return()=>clearInterval(id);},[phase]);

  // 已铸造：拉取自己星球的实时数据（等级/天气/居民数），每30秒刷新一次
  useEffect(()=>{
    if(phase!=="minted"||!planet)return;
    let stop=false;
    const fetchStats=async()=>{
      try{
        const res=await fetch(`/api/planet?id=${encodeURIComponent(planet.planetId)}`);
        if(res.ok){const d=await res.json();if(!stop)setMyStats(d);}
      }catch(e){console.error("[planet stats]",e);}
    };
    fetchStats();
    const id=setInterval(fetchStats,30000);
    return()=>{stop=true;clearInterval(id);};
  },[phase,planet]);

  const loadLeaderboard=async()=>{
    setBoardLoading(true);
    try{
      const res=await fetch("/api/planet-leaderboard");
      const d=await res.json();
      setBoard(d);
    }catch(e){console.error("[leaderboard]",e);setBoard({leaderboard:[],total:0,error:true});}
    setBoardLoading(false);
  };

  const openPlanet=async(p)=>{
    setViewing({...p,loading:true});
    try{
      const isOwn=piUser&&p.ownerId===piUser.uid;
      if(!isOwn&&piUser){
        await fetch("/api/planet",{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({action:"visit",id:p.id,visitorId:piUser.uid,visitorName:piUser.username})});
      }
      const res=await fetch(`/api/planet?id=${encodeURIComponent(p.id)}`);
      const d=await res.json();
      setViewing(d);
    }catch(e){console.error("[open planet]",e);setViewing({...p,loading:false,error:true});}
  };

  // ─── 星际地图（原3D星图，并入灵魂星球：展示真实星球而非虚构灵魂） ───
  const [galaxy,setGalaxy]=useState([]);
  const [galaxyLoading,setGalaxyLoading]=useState(false);
  const galaxyCanvasRef=useRef(null);
  const galaxyCamRef=useRef({theta:0.3,phi:0.2,r:300});
  const galaxyDragRef=useRef({on:false,x:0,y:0});
  const galaxyHoverRef=useRef(null);

  const loadGalaxy=async()=>{
    setGalaxyLoading(true);
    try{
      const res=await fetch("/api/planet-leaderboard?limit=300");
      const d=await res.json();
      const list=d.leaderboard||[];
      const placed=list.map((p,i)=>{
        const phi=Math.acos(1-2*(i+.5)/Math.max(list.length,1));
        const theta=Math.PI*(1+Math.sqrt(5))*i;
        const r=88+(p.level?.next?0:14); // 满级星球稍微外扩一圈，制造层次
        return{...p,ox:r*Math.sin(phi)*Math.cos(theta),oy:r*Math.cos(phi),oz:r*Math.sin(phi)*Math.sin(theta)};
      });
      setGalaxy(placed);
    }catch(e){console.error("[galaxy]",e);setGalaxy([]);}
    setGalaxyLoading(false);
  };

  // 星际地图 canvas 渲染（拖拽旋转/滚轮缩放/点击查看），只在 view==="galaxy" 时启动
  useEffect(()=>{
    if(view!=="galaxy")return;
    const canvas=galaxyCanvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");let animId;
    const syncSize=()=>{const r=canvas.getBoundingClientRect();if(canvas.width!==Math.round(r.width)||canvas.height!==Math.round(r.height)){canvas.width=Math.round(r.width);canvas.height=Math.round(r.height);}};
    syncSize();const ro=new ResizeObserver(syncSize);ro.observe(canvas);
    const bgStars=Array.from({length:200},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2+.2,ph:Math.random()*Math.PI*2,sp:Math.random()*.003+.001}));
    const project=(ox,oy,oz)=>{
      const{theta,phi,r}=galaxyCamRef.current;
      const cT=Math.cos(theta),sT=Math.sin(theta),cP=Math.cos(phi),sP=Math.sin(phi);
      const rx=ox*cT+oz*sT,rz=-ox*sT+oz*cT,ry2=oy*cP-rz*sP,rz2=oy*sP+rz*cP;
      const fov=r+50,sc=fov/(fov+rz2+30);
      return{sx:canvas.width/2+rx*sc*1.5,sy:canvas.height/2-ry2*sc*1.3,sc,depth:rz2};
    };
    const render=t=>{
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle="#050312";ctx.fillRect(0,0,canvas.width,canvas.height);
      bgStars.forEach(s=>{const op=.15+.55*Math.abs(Math.sin(t*.001*s.sp+s.ph));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,210,255,${op})`;ctx.fill();});
      if(!galaxyDragRef.current.on)galaxyCamRef.current.theta+=.0009;
      const visible=galaxy.map(p=>({...p,...project(p.ox,p.oy,p.oz)})).sort((a,b)=>a.depth-b.depth);
      visible.forEach(p=>{
        const isHov=galaxyHoverRef.current===p.id;
        const pulse=.75+.25*Math.sin(t*.003+p.ox*.05),rad=(isHov?9:6)*p.sc*pulse;
        const grad=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,rad*(isHov?5:3));
        grad.addColorStop(0,(p.color||"#7c6fff")+Math.round(p.sc*(isHov?200:90)).toString(16).padStart(2,"0"));grad.addColorStop(1,"transparent");
        ctx.fillStyle=grad;ctx.beginPath();ctx.arc(p.sx,p.sy,rad*(isHov?5:3),0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(p.sx,p.sy,rad,0,Math.PI*2);ctx.fillStyle=p.color||"#7c6fff";ctx.fill();
        if(isHov){ctx.font=`${Math.max(10,Math.round(12*p.sc))}px 'Noto Serif SC',serif`;const label=`${p.emoji||"🪐"} ${p.name}`,tw=ctx.measureText(label).width,lx=p.sx+rad+6,ly=p.sy+4;ctx.fillStyle="rgba(5,3,18,0.88)";ctx.fillRect(lx-2,ly-14*p.sc,tw+10,17*p.sc);ctx.fillStyle="#e8e0ff";ctx.fillText(label,lx+2,ly);}
      });
      ctx.font="11px monospace";ctx.fillStyle="rgba(180,160,255,0.28)";ctx.fillText(`${galaxy.length} 颗星球`,12,canvas.height-12);
      animId=requestAnimationFrame(render);
    };
    animId=requestAnimationFrame(render);
    const xy=e=>{
      // touchend 时 e.touches 已清空，必须用 e.changedTouches 拿最后触点
      const src=e.changedTouches?e.changedTouches[0]:e.touches?e.touches[0]:e;
      return{x:src.clientX,y:src.clientY};
    };
    const onDown=e=>{const{x,y}=xy(e);galaxyDragRef.current={on:true,x,y};};
    const onMove=e=>{
      const{x,y}=xy(e);
      if(galaxyDragRef.current.on){galaxyCamRef.current.theta+=(x-galaxyDragRef.current.x)*.006;galaxyCamRef.current.phi+=(y-galaxyDragRef.current.y)*.004;galaxyCamRef.current.phi=Math.max(-1.35,Math.min(1.35,galaxyCamRef.current.phi));galaxyDragRef.current={on:true,x,y};}
      const rect=canvas.getBoundingClientRect(),mx=x-rect.left,my=y-rect.top;
      let hit=null,minD=22;galaxy.forEach(p=>{const pr=project(p.ox,p.oy,p.oz),d=Math.hypot(pr.sx-mx,pr.sy-my);if(d<minD){minD=d;hit=p.id;}});
      galaxyHoverRef.current=hit;canvas.style.cursor=hit?"pointer":"grab";
    };
    const onUp=e=>{
      const{x,y}=xy(e);
      if(galaxyDragRef.current.on&&Math.hypot(x-galaxyDragRef.current.x,y-galaxyDragRef.current.y)<5&&galaxyHoverRef.current){

    };

    canvas.addEventListener("mousedown",onDown);canvas.addEventListener("mousemove",onMove);canvas.addEventListener("mouseup",onUp);
    canvas.addEventListener("mouseleave",()=>{galaxyDragRef.current.on=false;galaxyHoverRef.current=null;});
    canvas.addEventListener("wheel",onWheel,{passive:false});
    canvas.addEventListener("touchstart",onDown,{passive:true});canvas.addEventListener("touchmove",onMove,{passive:true});canvas.addEventListener("touchend",onUp);
    return()=>{cancelAnimationFrame(animId);ro.disconnect();canvas.removeEventListener("mousedown",onDown);canvas.removeEventListener("mousemove",onMove);canvas.removeEventListener("mouseup",onUp);canvas.removeEventListener("wheel",onWheel);canvas.removeEventListener("touchstart",onDown);canvas.removeEventListener("touchmove",onMove);canvas.removeEventListener("touchend",onUp);};

// ─── 照片全息图（Pi Browser兼容版：整图绘制+Canvas光效叠加）──
// 不使用crossOrigin（data URL无需），不用网格循环（性能友好）
// 视差3D感由CSS perspective tilt动画实现，全息光效由Canvas逐帧叠加
function PhotoHologram3D({photoSrc,size=220,name}){
  const wrapRef=useRef(null);
  const canvasRef=useRef(null);
  const animRef=useRef(null);
  const [ready,setReady]=useState(false);
  const [err,setErr]=useState("");

  useEffect(()=>{
    if(!photoSrc)return;
    setReady(false);setErr("");
    let cancelled=false,imgEl=null;

    const hue=Math.abs((name||"soul").split("").reduce((a,c)=>(a*31+c.charCodeAt(0))|0,0))%360;
    const col=(a)=>`hsla(${hue},80%,65%,${a})`;

    // 粒子轨道（一次性生成）
    const PARTS=90;
    const parts=Array.from({length:PARTS},(_,i)=>({
      a:(i/PARTS)*Math.PI*2,
      r:0.36+Math.random()*0.1,
      speed:0.003+Math.random()*0.004,
      phase:Math.random()*Math.PI*2,
      sz:0.8+Math.random()*1.6,
    }));

    imgEl=new Image();
    // 不设 crossOrigin：data URL 不需要，设了反而会失败
    imgEl.onload=()=>{
      if(cancelled)return;
      const canvas=canvasRef.current;
      if(!canvas)return;
      const ctx=canvas.getContext("2d");
      const S=size;
      canvas.width=S;canvas.height=S;
      const CX=S/2,CY=S/2;

      // 图片绘制区域（居中裁切为正方形）
      const iw=imgEl.naturalWidth,ih=imgEl.naturalHeight;
      const sc=Math.max(S/iw,S/ih);
      const dw=iw*sc,dh=ih*sc;
      const dx=(S-dw)/2,dy=(S-dh)/2;

      let t=0;
      const draw=()=>{
        if(cancelled)return;
        t+=0.02;
        ctx.clearRect(0,0,S,S);

        // 1. 圆形裁剪遮罩
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(CX,CY,S*0.46,S*0.46,0,0,Math.PI*2);
        ctx.clip();

        // 2. 照片底图（整张一次drawImage，无循环，性能好）
        ctx.drawImage(imgEl,dx,dy,dw,dh);

        // 3. 全息色调渐变叠加
        const tint=ctx.createRadialGradient(CX,CY,0,CX,CY,S*0.46);
        tint.addColorStop(0,col(0.05));
        tint.addColorStop(0.7,col(0.15));
        tint.addColorStop(1,col(0.42));
        ctx.fillStyle=tint;ctx.fillRect(0,0,S,S);

        // 4. 扫描线（每3px一条，轻量）
        for(let y=0;y<S;y+=3){
          ctx.fillStyle=`rgba(0,0,0,${0.05+0.03*Math.sin(y*0.2+t*2)})`;
          ctx.fillRect(0,y,S,1);
        }

        // 5. 移动扫描光带
        const sy=((t*45)%(S+32))-16;
        const sg=ctx.createLinearGradient(0,sy-10,0,sy+10);
        sg.addColorStop(0,"transparent");
        sg.addColorStop(0.5,col(0.5));
        sg.addColorStop(1,"transparent");
        ctx.fillStyle=sg;ctx.fillRect(0,sy-10,S,20);

        ctx.restore();

        // 6. 边缘发光环（在裁剪外绘制，形成halo效果）
        const ring=ctx.createRadialGradient(CX,CY,S*0.40,CX,CY,S*0.52);
        ring.addColorStop(0,col(0));
        ring.addColorStop(0.5,col(0.55+0.2*Math.sin(t*1.8)));
        ring.addColorStop(1,col(0));
        ctx.fillStyle=ring;ctx.fillRect(0,0,S,S);

        // 7. 粒子轨道
        parts.forEach(p=>{
          p.a+=p.speed;
          const px=CX+Math.cos(p.a)*p.r*S;
          const py=CY+Math.sin(p.a)*p.r*S*0.32;
          const op=0.35+0.55*Math.abs(Math.sin(t+p.phase));
          ctx.beginPath();
          ctx.arc(px,py,p.sz,0,Math.PI*2);
          ctx.fillStyle=col(op);
          ctx.fill();
        });

        // 8. 底部悬浮光盘
        ctx.beginPath();
        ctx.ellipse(CX,CY+S*0.44,S*0.26,S*0.04,0,0,Math.PI*2);
        const bg2=ctx.createLinearGradient(CX-S*0.26,0,CX+S*0.26,0);
        bg2.addColorStop(0,"transparent");
        bg2.addColorStop(0.5,col(0.45+0.2*Math.sin(t*1.3)));
        bg2.addColorStop(1,"transparent");
        ctx.fillStyle=bg2;ctx.fill();

        animRef.current=requestAnimationFrame(draw);
      };

      setReady(true);
      animRef.current=requestAnimationFrame(draw);

      // CSS perspective tilt动画：模拟3D悬浮感，不消耗Canvas性能
      if(wrapRef.current){
        wrapRef.current.style.animation="holoTilt 4s ease-in-out infinite";
      }
    };
    imgEl.onerror=()=>{if(!cancelled)setErr("照片加载失败");};
    imgEl.src=photoSrc;

    return()=>{
      cancelled=true;
      if(animRef.current)cancelAnimationFrame(animRef.current);
      if(imgEl)imgEl.src="";
      if(wrapRef.current)wrapRef.current.style.animation="";
    };
  },[photoSrc,size,name]);

  return(
    <div style={{position:"relative",width:size,height:size,margin:"0 auto",perspective:600}}>
      <div ref={wrapRef} style={{width:size,height:size,transformStyle:"preserve-3d"}}>
        <canvas ref={canvasRef} style={{width:size,height:size,display:"block"}}/>
      </div>
      {!ready&&!err&&(
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",
          background:"rgba(5,3,25,0.82)",borderRadius:"50%",fontSize:12,color:"rgba(200,184,255,0.6)"}}>
          生成全息影像…
        </div>
      )}
      {err&&(
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",
          background:"rgba(5,3,25,0.88)",borderRadius:"50%",fontSize:11,color:"#fca5a5",padding:10,textAlign:"center"}}>
          {err}
        </div>
      )}
    </div>
  );
}

// ─── 全息粒子动画 Canvas（无照片时的抽象后备方案） ───────────────
function HoloCanvas({name, birthYear, relation, size=220}){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current;if(!c)return;
    c.width=size*2;c.height=size*2;
    const ctx=c.getContext("2d");
    // 用名字+生日生成确定性种子颜色
    const seed=((name||"soul")+(birthYear||"")).split("").reduce((a,ch)=>(a*31+ch.charCodeAt(0))|0,0);
    const r0=n=>Math.abs(((seed*1664525+n*6364136+1013904223)&0x7fffffff)/0x7fffffff);
    const hue=Math.floor(r0(1)*360);
    const col=`hsl(${hue},70%,65%)`;
    const col2=`hsl(${(hue+60)%360},80%,70%)`;
    const cx=size,cy=size;
    // 粒子系统
    const particles=Array.from({length:120},(_,i)=>({
      angle:r0(i)*Math.PI*2,
      radius:r0(i+200)*(size*0.65)+size*0.08,
      speed:(r0(i+400)*0.008+0.002)*(r0(i+600)>0.5?1:-1),
      size:r0(i+800)*3+0.5,
      opacity:r0(i+1000)*0.7+0.2,
      phase:r0(i+1200)*Math.PI*2,
      layer:Math.floor(r0(i+1400)*3), // 0=inner 1=mid 2=outer
    }));
    let t=0,id;
    const draw=()=>{
      ctx.clearRect(0,0,c.width,c.height);
      // 背景光晕
      const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,size);
      bg.addColorStop(0,`hsla(${hue},60%,20%,0.18)`);
      bg.addColorStop(0.5,`hsla(${hue},50%,10%,0.10)`);
      bg.addColorStop(1,"transparent");
      ctx.fillStyle=bg;ctx.fillRect(0,0,c.width,c.height);
      // 中心全息光柱
      const pillar=ctx.createRadialGradient(cx,cy*0.3,0,cx,cy,size*0.7);
      pillar.addColorStop(0,`hsla(${hue},90%,85%,0.22)`);
      pillar.addColorStop(0.4,`hsla(${hue},70%,60%,0.10)`);
      pillar.addColorStop(1,"transparent");
      ctx.fillStyle=pillar;ctx.fillRect(0,0,c.width,c.height);
      // 扫描线（全息感）
      for(let y=0;y<c.height;y+=6){
        const a=0.03+0.02*Math.sin(y*0.1+t*0.5);
        ctx.fillStyle=`rgba(255,255,255,${a})`;
        ctx.fillRect(0,y,c.width,1);
      }
      // 粒子
      particles.forEach(p=>{
        p.angle+=p.speed;
        const pulse=0.7+0.3*Math.sin(t*0.04+p.phase);
        const wobble=Math.sin(t*0.02+p.phase)*8;
        const px=cx+Math.cos(p.angle)*(p.radius+wobble);
        const py=cy+Math.sin(p.angle)*(p.radius+wobble)*0.45;
        const a=p.opacity*pulse*(p.layer===0?1.2:p.layer===1?0.9:0.6);
        const ps=p.size*pulse;
        const grd=ctx.createRadialGradient(px,py,0,px,py,ps*3);
        grd.addColorStop(0,p.layer===1?col2:col);
        grd.addColorStop(1,"transparent");
        ctx.fillStyle=grd;ctx.beginPath();ctx.arc(px,py,ps*3,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(px,py,ps,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill();
      });
      // 中心人形剪影（抽象）
      ctx.save();ctx.translate(cx,cy);
      ctx.globalAlpha=0.12+0.06*Math.sin(t*0.03);
      // 头部光圈
      const head=ctx.createRadialGradient(0,-size*0.28,0,0,-size*0.28,size*0.14);
      head.addColorStop(0,col);head.addColorStop(1,"transparent");
      ctx.fillStyle=head;ctx.beginPath();ctx.arc(0,-size*0.28,size*0.14,0,Math.PI*2);ctx.fill();
      // 身体光影
      const body=ctx.createRadialGradient(0,0,0,0,0,size*0.22);
      body.addColorStop(0,col2);body.addColorStop(1,"transparent");
      ctx.fillStyle=body;ctx.beginPath();ctx.ellipse(0,size*0.05,size*0.09,size*0.22,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
      // 中心文字光圈
      ctx.save();ctx.globalAlpha=0.6+0.2*Math.sin(t*0.04);
      ctx.font=`bold ${Math.round(size*0.12)}px 'Ma Shan Zheng',serif`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=size*0.08;
      ctx.fillText(name?name.slice(0,4):"∞",cx,cy+size*0.12);
      ctx.restore();
      t++;id=requestAnimationFrame(draw);
    };
    id=requestAnimationFrame(draw);
    return()=>cancelAnimationFrame(id);
  },[name,birthYear,size]);
  return <canvas ref={ref} style={{width:size,height:size,borderRadius:"50%"}}/>;
}

// 构造"AI纪念馆"对话用的人设 System Prompt
function buildPersonaSystem(m,lang){
  if(lang==="zh"){
    return `你正在扮演已故的"${m.name}"，是用户的${m.relation}，生于${m.birthYear}年。
用户为TA写下的悼词是："${m.epitaph||"（未填写）"}"
关于TA的性格、口头禅与回忆片段：${m.persona||"（用户未提供更多细节，请保持笼统温暖，不要编造具体事件、地名或他人姓名）"}

请用第一人称、温暖克制的语气回应用户，像家人间的对话。回复控制在2-3句话以内，不要使用"作为AI"之类的表述，也不要编造用户没提供过的具体事实细节。如果用户情绪低落或在表达思念，优先给予安慰和陪伴感，不要说教或转移话题。`;
  }
  return `You are roleplaying as the deceased "${m.name}", the user's ${m.relation}, born in ${m.birthYear}.
Epitaph written by the user: "${m.epitaph||"(none)"}"
Personality/memories provided: ${m.persona||"(none provided — stay warm and general, do not invent specific events, places or other names)"}

Respond in first person, warm and brief (2-3 sentences max), like family talking. Never say "as an AI". Never invent specific facts not given. If the user seems sad or longing, prioritize comfort over redirecting the topic.`;
}

  const [chatHistory,setChatHistory]=useState({}); // {[memorialId]: [{role,content}]}

  const [bio,setBio]=useState({});           // {[memorialId]: text}

    if(!form.name||!form.relation||!form.birthYear||!form.consent)return;

    if(r.success){

        birthYear:form.birthYear,epitaph:form.epitaph,persona:form.persona||"",photo:form.photoPreview||null,

    }
    setPaying(false);

  const sendTalk=async()=>{
    if(!talkMsg.trim()||!piUser||!cur)return;
    const userText=talkMsg.trim();
    setTalking(true);setAiErr("");
    const r=await payWithPi(0.1,"AI纪念馆对话");
    if(!r.success){setTalking(false);return;}
    const hist=chatHistory[cur.id]||[];

    setChatHistory(h=>({...h,[cur.id]:newHist}));
    setTalkMsg("");

      const res=await fetch("/api/ai-chat",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({system:buildPersonaSystem(cur,lang),messages:newHist})});
      const data=await res.json();
      if(!res.ok)throw new Error(data?.error?.error?.message||data?.error||"AI回应失败");

      setChatHistory(h=>({...h,[cur.id]:[...newHist,{role:"assistant",content:reply}]}));

      console.error("[ai-chat]",e);
      setAiErr(lang==="zh"?"连接灵魂的信号暂时中断了，请检查网络或稍后重试。":"Connection lost — please try again later.");
    }
    setTalking(false);
  };

  const genBio=async()=>{
    if(!cur||!piUser)return;
    setBioLoading(true);setAiErr("");

        body:JSON.stringify({system:sys,messages:[{role:"user",content:lang==="zh"?"请开始写。":"Please write it."}]})});

              <span style={{fontSize:12,color:"rgba(180,160,255,0.5)",letterSpacing:1}}>✦ {lang==="zh"?"AI纪念馆 · 与TA对话":"AI Memorial · Talk to them"}</span>
              <span style={{fontSize:9,color:"rgba(180,160,255,0.35)"}}>{lang==="zh"?"AI根据你填写的资料模拟，非真实意识":"AI simulation based on your input — not real consciousness"}</span>
            </div>

            {(chatHistory[cur.id]||[]).length>0&&(
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12,maxHeight:280,overflowY:"auto",paddingRight:4}}>
                {(chatHistory[cur.id]||[]).map((msg,i)=>(
                  <div key={i} style={{alignSelf:msg.role==="user"?"flex-end":"flex-start",maxWidth:"82%",
                    padding:"9px 13px",borderRadius:12,fontSize:13,lineHeight:1.7,
                    background:msg.role==="user"?"rgba(91,63,255,0.35)":"rgba(100,80,200,0.1)",
                    border:msg.role==="user"?"none":"1px solid rgba(150,130,255,0.2)",
                    color:msg.role==="user"?"#fff":"rgba(220,210,255,0.85)",
                    fontStyle:msg.role==="user"?"normal":"italic"}}>
                    {msg.content}
                  </div>
                ))}
              </div>
            )}

            <textarea style={{...S.input,height:70,resize:"none",lineHeight:1.9,marginBottom:10}}
              placeholder={tl("memorialTalkPh",lang)}
              value={talkMsg} onChange={e=>setTalkMsg(e.target.value)}/>
            <button style={{...S.btn,width:"100%",opacity:talkMsg.trim()&&piUser?1:0.4}}
              disabled={!talkMsg.trim()||!piUser||talking} onClick={sendTalk}>
              {talking?(lang==="zh"?"TA正在感受你的话…":"…"):(lang==="zh"?"对TA说 · 0.1π":"Speak to them · 0.1π")}
            </button>
            {!piUser&&<div style={S.warn}>{tl("pioneerPiWarn",lang)}</div>}
            {aiErr&&<div style={{...S.warn,color:"#fca5a5"}}>{aiErr}</div>}
          </div>

          {/* AI人生传记 */}
          <div style={{...S.card,padding:"18px 20px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <span style={{fontSize:12,color:"rgba(180,160,255,0.5)",letterSpacing:1}}>✦ {lang==="zh"?"AI人生传记":"AI Biography"}</span>
              <button style={{...S.ghost,padding:"6px 14px",fontSize:11,opacity:piUser?1:0.4}}
                disabled={!piUser||bioLoading} onClick={genBio}>
                {bioLoading?(lang==="zh"?"撰写中…":"Writing…"):(bio[cur.id]?(lang==="zh"?"重新生成 · 0.5π":"Regenerate · 0.5π"):(lang==="zh"?"生成传记 · 0.5π":"Generate · 0.5π"))}
              </button>
            </div>
            {bio[cur.id]
              ? <div style={{fontSize:13,color:"rgba(220,210,255,0.85)",lineHeight:2,whiteSpace:"pre-wrap"}}>{bio[cur.id]}</div>
              : <div style={{fontSize:12,color:"rgba(180,160,255,0.4)",lineHeight:1.8}}>{lang==="zh"?"根据你填写的关系、悼词与回忆，AI将为TA写一篇小传。":"AI will write a short biography from the relation, epitaph and memories you provided."}</div>}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── 先锋纪念碑页 ──────────────────────────────────────────────
const MOCK_PIONEERS=[
  {id:"p1",name:"创世矿工#001",years:"2019-2020",words:"我在黑暗中点燃了第一根蜡烛，哪怕没有人看见",flames:128,created:"2019-03-14"},
  {id:"p2",name:"沙漠信仰者",years:"2019-2021",words:"三年，每天签到，从未放弃，这就是我留下的证明",flames:89,created:"2020-06-01"},
  {id:"p3",name:"无名节点99",years:"2020-2022",words:"我的手机发烫了三年，Pi是我送给未来的礼物",flames:204,created:"2020-11-10"},
  {id:"p4",name:"星海先行者",years:"2019-2023",words:"别人问我挖什么，我说我在种未来",flames:315,created:"2019-12-25"},
  {id:"p5",name:"数字游牧民",years:"2020-2021",words:"我来过，我挖过，哪怕只剩下这几行字",flames:67,created:"2021-03-01"},
  {id:"p6",name:"凌晨三点的矿工",years:"2019-2022",words:"别人睡着的时候，我在为区块链守夜",flames:441,created:"2020-01-20"},
];

function PioneerPage({profile,piUser,payWithPi,lang}){
  const [pioneers,setPioneers]=useState(MOCK_PIONEERS);
  const [creating,setCreating]=useState(false);
  const [form,setForm]=useState({name:"",years:"",words:""});
  const [paying,setPaying]=useState(false);
  const [flames,setFlames]=useState({});
  const [flamingId,setFlamingId]=useState(null);
  const [sortBy,setSortBy]=useState("flames"); // flames | recent
  const totalFlames=pioneers.reduce((a,p)=>a+p.flames,0);

  const engrave=async()=>{
    if(!form.name||!form.words)return;
    setPaying(true);
    const r=await payWithPi(0.5,"先锋纪念碑");
    if(r.success){
      setPioneers(ps=>[{id:"p"+Date.now(),...form,flames:0,created:new Date().toISOString().slice(0,10)},...ps]);
      setForm({name:"",years:"",words:""});setCreating(false);
    }
    setPaying(false);
  };

  const lightFlame=async(pid)=>{
    if(flames[pid]||flamingId)return;
    setFlamingId(pid);
    await payWithPi(0.1,"先锋长明灯-"+pid);
    setFlames(f=>({...f,[pid]:true}));
    setPioneers(ps=>ps.map(p=>p.id===pid?{...p,flames:p.flames+1}:p));
    setFlamingId(null);
  };

  const sorted=[...pioneers].sort((a,b)=>sortBy==="flames"?b.flames-a.flames:
    new Date(b.created)-new Date(a.created));

  return(
    <div style={S.section}>
      {/* 标题 */}
      <div style={{marginBottom:20}}>
        <h2 style={{fontFamily:"'Ma Shan Zheng',serif",fontSize:26,color:"#e8e0ff",margin:"0 0 4px"}}>{tl("pioneerTitle",lang)}</h2>
        <p style={{fontSize:13,color:"rgba(180,160,255,0.5)",margin:0,lineHeight:1.7}}>{tl("pioneerSub",lang)}</p>
      </div>

      {/* 纪念碑全景 Canvas */}
      <div style={{...S.card,padding:0,overflow:"hidden",marginBottom:18,borderRadius:16,position:"relative",height:200}}>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,#050312 0%,#0d0820 40%,#050312 100%)"}}>
          {/* 星空背景 */}
          {Array.from({length:60}).map((_,i)=>(
            <div key={i} style={{position:"absolute",
              left:`${(i*37+13)%100}%`,top:`${(i*23+7)%80}%`,
              width:i%5===0?2:1,height:i%5===0?2:1,
              borderRadius:"50%",background:"white",
              opacity:0.3+Math.sin(i)*0.4}}/>
          ))}
          {/* 纪念碑主体 */}
          <div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",
            width:80,height:160,background:"linear-gradient(180deg,rgba(150,130,255,0.3),rgba(100,80,200,0.15))",
            clipPath:"polygon(20% 0%,80% 0%,100% 100%,0% 100%)",
            borderTop:"2px solid rgba(150,130,255,0.6)",
            boxShadow:"0 0 40px rgba(124,111,255,0.3),0 0 80px rgba(124,111,255,0.1)"}}>
            <div style={{position:"absolute",top:10,left:"50%",transform:"translateX(-50%)",
              fontSize:20,filter:"drop-shadow(0 0 8px #c8b8ff)"}}>π</div>
          </div>
          {/* 两侧火焰 */}
          {[-120,120].map((offset,i)=>(
            <div key={i} style={{position:"absolute",bottom:10,left:`calc(50% + ${offset}px)`,
              transform:"translateX(-50%)",fontSize:24,animation:`pulse ${1.5+i*0.3}s ease infinite`}}>🔥</div>
          ))}
          {/* 统计 */}
          <div style={{position:"absolute",top:12,left:0,right:0,textAlign:"center"}}>
            <div style={{fontSize:11,color:"rgba(180,160,255,0.5)",letterSpacing:2}}>
              {tl("pioneerCount",lang)} <span style={{color:"#c8b8ff",fontWeight:"bold"}}>{pioneers.length}</span>
              &nbsp;·&nbsp; 🔥 {totalFlames.toLocaleString()}
            </div>
          </div>
          {/* 底部铭文 */}
          <div style={{position:"absolute",bottom:8,left:0,right:0,textAlign:"center"}}>
            <div style={{fontFamily:"'Ma Shan Zheng',serif",fontSize:13,color:"rgba(180,160,255,0.4)",letterSpacing:3}}>
              {lang==="zh"?"燃烧吧，无名先锋":"Burn on, nameless pioneers"}
            </div>
          </div>
        </div>
      </div>

      {/* 操作栏 */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <button style={S.btn} onClick={()=>setCreating(true)}>{tl("pioneerAdd",lang)}</button>
        <div style={{marginLeft:"auto",display:"flex",gap:6}}>
          {[["flames",lang==="zh"?"🔥 按热度":"🔥 By flame"],["recent",lang==="zh"?"🕐 最新":"🕐 Recent"]].map(([v,label])=>(
            <button key={v} onClick={()=>setSortBy(v)} style={{...S.ghost,padding:"7px 12px",fontSize:11,
              background:sortBy===v?"rgba(100,80,200,0.3)":"rgba(100,80,200,0.08)",
              color:sortBy===v?"#e8e0ff":"rgba(180,160,255,0.5)"}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* 创建表单 */}
      {creating&&(
        <div style={{...S.card,padding:"22px",marginBottom:18,animation:"fadeUp 0.3s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{fontFamily:"'Ma Shan Zheng',serif",fontSize:18,color:"#e8e0ff"}}>{tl("pioneerAdd",lang)}</span>
            <button onClick={()=>setCreating(false)} style={{background:"none",border:"none",color:"rgba(180,160,255,0.4)",cursor:"pointer",fontSize:18}}>×</button>
          </div>
          <div style={{marginBottom:12}}>
            <label style={S.label}>{tl("pioneerName",lang)}</label>
            <input style={S.input} placeholder={tl("pioneerNamePh",lang)} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
          </div>
          <div style={{marginBottom:12}}>
            <label style={S.label}>{tl("pioneerYears",lang)}</label>
            <input style={S.input} placeholder={tl("pioneerYearsPh",lang)} value={form.years} onChange={e=>setForm(f=>({...f,years:e.target.value}))}/>
          </div>
          <div style={{marginBottom:16}}>
            <label style={S.label}>{tl("pioneerWords",lang)}</label>
            <textarea style={{...S.input,height:90,resize:"none",lineHeight:1.9}}
              placeholder={tl("pioneerWordsPh",lang)}
              value={form.words} onChange={e=>setForm(f=>({...f,words:e.target.value}))}/>
          </div>
          <button style={{...S.btn,width:"100%",opacity:form.name&&form.words&&piUser?1:0.4}}
            disabled={!form.name||!form.words||!piUser||paying} onClick={engrave}>
            {paying?tl("pioneerEngraving",lang):tl("pioneerEngrave",lang)}
          </button>
          {!piUser&&<div style={S.warn}>{tl("pioneerPiWarn",lang)}</div>}
        </div>
      )}

      {/* 先锋名墙 */}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:"rgba(180,160,255,0.4)",letterSpacing:2,marginBottom:12}}>
          ✦ {tl("pioneerWall",lang)} · {tl("pioneerWallSub",lang)}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {sorted.map((p,idx)=>(
            <div key={p.id} style={{...S.card,padding:"16px 18px",
              border:idx===0&&sortBy==="flames"?"1px solid rgba(251,191,36,0.3)":"1px solid rgba(150,130,255,0.15)",
              background:idx===0&&sortBy==="flames"?"rgba(251,191,36,0.04)":"rgba(12,8,35,0.92)"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                {/* 序号/荣誉 */}
                <div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                  background:idx===0?"linear-gradient(135deg,#b45309,#fbbf24)":idx===1?"linear-gradient(135deg,#4b5563,#9ca3af)":idx===2?"linear-gradient(135deg,#78350f,#d97706)":"rgba(100,80,200,0.15)",
                  fontSize:idx<3?13:11,color:idx<3?"#fff":"rgba(180,160,255,0.5)",fontWeight:"bold"}}>
                  {idx<3?["🥇","🥈","🥉"][idx]:idx+1}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontSize:14,color:"#e8e0ff",fontFamily:"'Ma Shan Zheng',serif"}}>{p.name}</span>
                    {p.years&&<span style={{fontSize:10,color:"rgba(180,160,255,0.4)",background:"rgba(100,80,200,0.12)",padding:"1px 6px",borderRadius:10}}>{p.years}</span>}
                  </div>
                  <div style={{fontSize:12,color:"rgba(200,190,255,0.7)",lineHeight:1.8,fontStyle:"italic",marginBottom:8}}>
                    "{p.words}"
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:12,fontSize:11,color:"rgba(180,160,255,0.4)"}}>
                    <span>🔥 {p.flames} {lang==="zh"?"长明灯":"flames"}</span>
                    <span>📅 {p.created}</span>
                  </div>
                </div>
                {/* 点燃长明灯 */}
                <button
                  onClick={()=>lightFlame(p.id)}
                  disabled={!!flames[p.id]||flamingId===p.id}
                  style={{flexShrink:0,padding:"8px 12px",borderRadius:10,fontSize:11,cursor:flames[p.id]?"default":"pointer",
                    background:flames[p.id]?"rgba(251,191,36,0.15)":"rgba(100,80,200,0.12)",
                    border:flames[p.id]?"1px solid rgba(251,191,36,0.4)":"1px solid rgba(150,130,255,0.2)",
                    color:flames[p.id]?"#fbbf24":"rgba(180,160,255,0.6)",
                    transition:"all 0.2s",whiteSpace:"nowrap"}}>
                  {flamingId===p.id?"…":flames[p.id]?"🔥 "+tl("pioneerFlamed",lang).slice(0,4):("🔥 "+tl("pioneerFlame",lang)+" 0.1π")}
                </button>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* 底部铭言 */}
      <div style={{textAlign:"center",padding:"20px",color:"rgba(180,160,255,0.3)",fontSize:12,fontFamily:"'Ma Shan Zheng',serif",letterSpacing:2,lineHeight:2}}>
        {lang==="zh"
          ?"历史不会记住每一个名字\n但区块链会\n这里，每一个先锋都永远存在"
          :"History may not remember every name\nBut the blockchain will\nHere, every pioneer exists forever"}
      </div>
    </div>
  );
}

function SoulHaven(){
  const [page,setPage]=useState("home");
  const [lang,setLang]=useState("zh");
  const [profile,setProfile]=useState({name:"",birth:"",theme:"cosmos",epitaph:"",nft:false});
  const {piUser,connectPi,payWithPi,piLoading,piError}=usePiNetwork();

  // Inject Pi foundational SDK — must be in <head> before auth runs
  useEffect(()=>{
    if(document.querySelector('script[src*="pi-sdk"]'))return;
    const s=document.createElement("script");
    s.src="https://sdk.minepi.com/pi-sdk.js";
    s.async=true;
    document.head.insertBefore(s,document.head.firstChild);
  },[]);

  useEffect(()=>{
    const link=document.createElement("link");link.rel="stylesheet";link.href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;500&display=swap";
    document.head.appendChild(link);return()=>{try{document.head.removeChild(link);}catch{}};
  },[]);
  return(
    <div style={{fontFamily:"'Noto Serif SC',serif",minHeight:"100vh",background:"#050312",color:"#e8e0ff",paddingTop:90}}>
      <style>{`
        *{box-sizing:border-box;margin:0;padding:0}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.4)}}
        @keyframes glow{0%,100%{text-shadow:0 0 20px rgba(150,130,255,0.3)}50%{text-shadow:0 0 60px rgba(150,130,255,0.7)}}
        @keyframes floatUp{0%{opacity:1;transform:translate(0,0)}100%{opacity:0;transform:translate(0,-70px)}}
        @keyframes playProgress{from{width:0}to{width:100%}}
        @keyframes scanLine{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
        @keyframes holoTilt{0%,100%{transform:rotateX(4deg) rotateY(-4deg) scale(1.01)}25%{transform:rotateX(-3deg) rotateY(5deg) scale(1.02)}50%{transform:rotateX(5deg) rotateY(3deg) scale(1.01)}75%{transform:rotateX(-4deg) rotateY(-5deg) scale(1.02)}}
        input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
        input:focus,textarea:focus{border-color:rgba(150,130,255,0.5)!important;outline:none}
        button:hover{opacity:.9;transform:translateY(-1px)}
        ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:rgba(150,130,255,0.2);border-radius:2px}
      `}</style>
      <StarField/>
      <Nav page={page} setPage={setPage} piUser={piUser} onConnect={connectPi} piLoading={piLoading} piError={piError} lang={lang} setLang={setLang}/>
      {page==="home"    &&<HomePage    profile={profile} setProfile={setProfile} piUser={piUser} connectPi={connectPi} payWithPi={payWithPi} lang={lang}/>}
      {page==="ritual"  &&<RitualPage  profile={profile} lang={lang}/>}
      {page==="board"   &&<BoardPage   profile={profile} lang={lang}/>}
      {page==="capsule" &&<CapsulePage profile={profile} piUser={piUser} payWithPi={payWithPi} lang={lang}/>}
      {page==="planet"  &&<PlanetPage  profile={profile} piUser={piUser} connectPi={connectPi} payWithPi={payWithPi} lang={lang}/>}
      {page==="legacy"  &&<LegacyPage  profile={profile} piUser={piUser} payWithPi={payWithPi} lang={lang}/>}
      {page==="voice"   &&<VoicePage   profile={profile} piUser={piUser} payWithPi={payWithPi} lang={lang}/>}
      {page==="memorial"&&<MemorialPage profile={profile} piUser={piUser} payWithPi={payWithPi} lang={lang}/>}
      {page==="pioneer" &&<PioneerPage  profile={profile} piUser={piUser} payWithPi={payWithPi} lang={lang}/>}
      <MusicPlayer lang={lang}/>
    </div>
  );
}

    try{
      document.getElementById('loading').style.display='none';
      ReactDOM.createRoot(document.getElementById("root")).render(<SoulHaven/>);
    }catch(e){
      document.getElementById('loading').style.display='none';
      var err=document.getElementById('error');
      err.style.display='block';
      err.textContent='Render Error: '+e.message+'\n'+e.stack;
    }
  </script>
</body>
</html>
